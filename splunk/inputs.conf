# splunk-obs — file monitor input
#
# Drop this in $SPLUNK_HOME/etc/system/local/ (or a dedicated app's local/) on
# the host that can see Factorio's script-output directory — the machine running
# the game, or wherever a Universal Forwarder tails it.
#
# The path below is the macOS default. Adjust for your platform:
#   macOS    ~/Library/Application Support/factorio/script-output/splunk-obs/
#   Windows  %APPDATA%\Factorio\script-output\splunk-obs\
#   Linux    ~/.factorio/script-output/splunk-obs/
#   Steam    may live under the Steam userdata / proton prefix instead
#
# Monitor stanza headers take literal paths — spaces are fine, do not quote.

[monitor:///Users/brett/Library/Application Support/factorio/script-output/splunk-obs/*.ndjson]
sourcetype = factorio:metric
index = factorio_metrics
disabled = false
# Metrics are cumulative-appended; Splunk tracks read position, so no crcSalt needed.
