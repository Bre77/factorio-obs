# splunk-obs — sourcetype for the mod's multi-metric NDJSON
#
# Goes in $SPLUNK_HOME/etc/system/local/ on the indexer (or the full Splunk
# instance / heavy forwarder that parses the data).
#
# The mod emits Splunk multi-metric JSON: every "metric_name:<signal>" key is a
# measurement, every other key (surface, exporter, wire, network_id) is a
# dimension. category = Metrics + INDEXED_EXTRACTIONS = json is what turns those
# into metric data points on ingest.
#
# The mod cannot emit a real timestamp (the Factorio Lua sandbox has no wall
# clock), so we let Splunk stamp _time at ingest — accurate to ~1s for a live
# game. If you ship historical/offline data and need game-accurate time, use the
# bridge in HEC mode instead (it stamps time.time() as it reads).

[factorio:metric]
INDEXED_EXTRACTIONS = json
category = Metrics
DATETIME_CONFIG = CURRENT
TIMESTAMP_FIELDS =
# One JSON object per line:
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
