[mod-setting-name]
circuit-logger-sample-interval=Sample interval (ticks)
circuit-logger-filename=Output file (under script-output)

[mod-setting-description]
circuit-logger-sample-interval=How often to sample circuit signals from named Display Panels. 60 ticks = 1 second at normal game speed. Lower = higher resolution but more work per tick.
circuit-logger-filename=Path of the NDJSON output file, relative to the Factorio script-output directory. The folder is created automatically.
