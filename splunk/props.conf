# splunk-obs — sourcetype for the mod's JSON events
#
# Goes in $SPLUNK_HOME/etc/system/local/ on the indexer (or the full Splunk
# instance / heavy forwarder that parses the data).
#
# Each line is one JSON event: one Display Panel's signals for one sample, as a
# nested tree wire.<color>.<item_type>.<item_name>[.<quality>] = value.
#
# The mod cannot emit a real timestamp (its Lua sandbox has no wall clock), so we
# let Splunk stamp _time at ingest — accurate to ~1s for a live game. If you ship
# historical/offline data and need real time, use the bridge in HEC mode (it
# stamps time.time() as it reads).

[factorio:event]
# One JSON object per line:
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
# Parse the JSON so nested fields are extractable (search-time; use spath / dot
# paths like wire.green.item.iron-plate.normal). Switch to INDEXED_EXTRACTIONS
# = json instead if you want the fields indexed at ingest.
KV_MODE = json
TRUNCATE = 100000
DATETIME_CONFIG = CURRENT
TIMESTAMP_FIELDS =
